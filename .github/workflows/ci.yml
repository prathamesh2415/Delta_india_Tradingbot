# CI — runs on every push and pull request (safe: tests only, no live trading)
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        env:
          DELTA_API_KEY: test_key_ci
          DELTA_API_SECRET: test_secret_ci
          PAPER_TRADING: "true"
          DATABASE_PATH: ":memory:"
        run: pytest --cov=trading_bot --cov-report=term-missing --cov-fail-under=80 -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
