# CD — deploy to EC2 after tests pass on main (learning pipeline)
# Secrets: see deploy/CICD_LEARNING.md
name: CD

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to Windows EC2
        if: ${{ secrets.EC2_OS != 'linux' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_SSH_PORT || 22 }}
          script_stop: true
          script: |
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\TradingBot\deploy\cd-deploy.ps1"

